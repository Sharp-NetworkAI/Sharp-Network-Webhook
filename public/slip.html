<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Slip</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: #fff;
      padding: 20px;
    }

    .wrap {
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: #17171c;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px 0;
    }

    h2 {
      margin-top: 0;
    }

    .leg {
      padding: 10px 0;
      border-bottom: 1px solid #2a2a34;
    }

    .leg:last-child {
      border-bottom: none;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      background: #2a6df4;
      color: white;
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
      text-decoration: none;
    }

    .btn.secondary {
      background: #2a2a34;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="card">
      <h1>Slip copied ✅</h1>
      <p>Select a sportsbook:</p>
    </div>

    <div class="card">
      <h2>Legs</h2>
      <div id="legs"></div>
    </div>

    <div class="card">
      <a id="betmgm" class="btn" target="_blank">Open in BetMGM</a>
      <a class="btn secondary">FanDuel (coming soon)</a>
      <a class="btn secondary">DraftKings (coming soon)</a>
    </div>

  </div>

  <script>
    async function loadSlip() {
      const parts = window.location.pathname.split("/");
      const slipId = parts[parts.length - 1];

      try {
        const resp = await fetch(`/api/slip/${slipId}`);
        const data = await resp.json();

        if (!resp.ok || !data.success) {
          throw new Error("Slip not found");
        }

        const slip = data.slip;
        const legsDiv = document.getElementById("legs");
        legsDiv.innerHTML = "";

        (slip.legs || []).forEach((leg, i) => {
          const div = document.createElement("div");
          div.className = "leg";

          const label =
            leg.team ||
            leg.participant ||
            leg.rawSelection ||
            "Unknown leg";

          const oddsText = leg.odds ? ` (${leg.odds})` : "";

          div.innerText = `${i + 1}. ${label}${oddsText}`;
          legsDiv.appendChild(div);
        });

        // 🔥 BetMGM link (if available)
        if (slip.betmgmLink) {
          document.getElementById("betmgm").href = slip.betmgmLink;
        } else {
          document.getElementById("betmgm").innerText = "BetMGM (not ready)";
          document.getElementById("betmgm").style.opacity = "0.5";
        }

      } catch (err) {
        document.body.innerHTML = `
          <div class="wrap">
            <div class="card">
              <h1>Slip not found</h1>
              <p>This slip may have expired.</p>
            </div>
          </div>
        `;
      }
    }

    loadSlip();
  </script>
</body>
</html>
